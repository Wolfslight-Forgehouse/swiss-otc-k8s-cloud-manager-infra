apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  description: "Cluster-level infrastructure (CNI, Ingress, Storage, Monitoring)"
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: admin
      description: "Full access to infrastructure project"
      policies:
        - p, proj:infrastructure:admin, applications, *, infrastructure/*, allow
