# ── Cluster Identity ────────────────────────────────────────────
cluster:
  name: ""
  kubernetesVersion: "v1.28.15+rke2r1"

# ── Sizing Presets ──────────────────────────────────────────────
# small:  1 CP + 2 Worker
# medium: 3 CP + 3 Worker (HA)
# large:  3 CP + 5 Worker (HA)
# custom: User-defined
sizing:
  preset: "small"
  custom:
    controlPlaneCount: 1
    workerCount: 2

# ── OTC Compute ─────────────────────────────────────────────────
compute:
  region: "eu-ch2"
  availabilityZone: "eu-ch2a"
  controlPlaneFlavor: "s3.xlarge.4"
  workerFlavor: "s3.large.4"
  imageName: "Standard_Ubuntu_22.04_latest"
  sshUser: "ubuntu"
  rootVolumeSize: 50
  rootVolumeType: "SSD"

# ── OTC Networking ──────────────────────────────────────────────
network:
  vpcId: ""
  subnetId: ""
  securityGroups: ""

# ── OTC Credentials ────────────────────────────────────────────
# Option A: Reference existing Rancher Cloud Credential
cloudCredentialSecretName: ""

# Option B: Inline credentials (used when cloudCredentialSecretName is empty)
otcCredentials:
  authUrl: "https://iam-pub.eu-ch2.sc.otc.t-systems.com/v3"
  domainName: ""
  username: ""
  password: ""
  projectId: ""
  projectName: ""
  accessKey: ""
  secretKey: ""

# ── Cloud Controller Manager ───────────────────────────────────
ccm:
  enabled: true
  image:
    repository: "ghcr.io/wolfslight-forgehouse/swiss-otc-cloud-controller-manager"
    tag: "latest"
  elb:
    subnetId: ""
    networkId: ""
    floatingNetworkId: ""
    availabilityZones:
      - "eu-ch2a"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── KubeOVN ─────────────────────────────────────────────────────
kubeovn:
  enabled: true
  version: "v1.13.0"
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  joinSubnet: "100.64.0.0/16"
  tunnelType: "geneve"
  networkPolicy: "iptables"
  # RKE2-specific paths — without these, kube-ovn-cni stays 0/N Running
  kubeletDir: "/var/lib/rancher/rke2/agent/kubelet"
  cniConfDir: "/var/lib/rancher/rke2/agent/etc/cni/net.d"
  cniBinDir: "/opt/cni/bin"
  ovnCentral:
    requests:
      cpu: "100m"
      memory: "100Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
