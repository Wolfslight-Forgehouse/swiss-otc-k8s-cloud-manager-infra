# Swiss OTC Cloud Manager — GitLab CI/CD Pipeline
#
# Copy this file to your repo root as .gitlab-ci.yml
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   OTC_ACCESS_KEY, OTC_SECRET_KEY, OTC_PROJECT_ID
#   SSH_PUBLIC_KEY, SSH_PRIVATE_KEY, RKE2_TOKEN
#   GHCR_PULL_TOKEN (or use GitLab Container Registry)
#
# For GitLab Runner setup, see runner-setup.sh

stages:
  - validate
  - plan
  - apply
  - post-apply
  - build
  - deploy
  - pre-destroy
  - destroy

variables:
  TF_DIR: terraform/environments/dev
  HELM_CHART: deploy/helm/swiss-otc-ccm
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}/swiss-otc-cloud-controller-manager
  GO_VERSION: "1.25"

# ─────────────────────────────────────────────
# Terraform Jobs
# ─────────────────────────────────────────────

.terraform_base:
  image: hashicorp/terraform:1.7
  before_script:
    - cd ${TF_DIR}
    - export AWS_ACCESS_KEY_ID=${OTC_ACCESS_KEY}
    - export AWS_SECRET_ACCESS_KEY=${OTC_SECRET_KEY}
    - export TF_VAR_access_key=${OTC_ACCESS_KEY}
    - export TF_VAR_secret_key=${OTC_SECRET_KEY}
    - export TF_VAR_project_id=${OTC_PROJECT_ID}
    - export TF_VAR_ssh_public_key="${SSH_PUBLIC_KEY}"
    - export TF_VAR_ssh_private_key="${SSH_PRIVATE_KEY}"
    - export TF_VAR_rke2_token="${RKE2_TOKEN}"
    - export TF_VAR_ghcr_pull_token="${GHCR_PULL_TOKEN}"
    - export TF_VAR_github_runner_token=""
    - terraform init

terraform:validate:
  extends: .terraform_base
  stage: validate
  script:
    - terraform validate
    - terraform fmt -check -recursive ../..
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

terraform:plan:
  extends: .terraform_base
  stage: plan
  script:
    - terraform plan -no-color -out=tfplan
  artifacts:
    paths:
      - ${TF_DIR}/tfplan
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

terraform:apply:
  extends: .terraform_base
  stage: apply
  script:
    - |
      # Generate GitLab Runner registration token if available
      if [ -n "${GITLAB_RUNNER_REG_TOKEN}" ]; then
        export TF_VAR_github_runner_token=""  # Not used for GitLab
      fi
    - terraform plan -no-color
    - terraform apply -auto-approve
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  allow_failure: false


# ─────────────────────────────────────────────
# Pre-Destroy: Clean up ELBs via CCM
# ─────────────────────────────────────────────

pre-destroy:cleanup:
  stage: pre-destroy
  tags:
    - otc
  before_script:
    - mkdir -p ~/.kube
    - echo "${KUBECONFIG_CONTENT}" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - |
      echo "=== Cleaning up LoadBalancer services ==="
      LB_SVCS=$(kubectl get svc --all-namespaces -o json | \
        jq -r '.items[] | select(.spec.type=="LoadBalancer") | "\(.metadata.namespace)/\(.metadata.name)"')
      
      if [ -z "$LB_SVCS" ]; then
        echo "No LoadBalancer services — nothing to clean up"
        exit 0
      fi
      
      echo "$LB_SVCS" | while read svc; do
        NS=$(echo $svc | cut -d/ -f1)
        NAME=$(echo $svc | cut -d/ -f2)
        echo "Deleting $NS/$NAME..."
        kubectl delete svc "$NAME" -n "$NS" --timeout=60s || true
      done
      
      echo "Waiting 30s for CCM to delete ELBs..."
      sleep 30
  allow_failure: true  # Don't block destroy if runner offline
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

terraform:destroy:
  extends: .terraform_base
  stage: destroy
  needs:
    - job: pre-destroy:cleanup
      optional: true
  script:
    - terraform destroy -auto-approve
  environment:
    name: production
    action: stop
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  allow_failure: false


# ─────────────────────────────────────────────
# Post-Apply: Auto-configure cluster
# ─────────────────────────────────────────────

post-apply:configure:
  stage: post-apply
  tags:
    - otc
  variables:
    GHCR_PULL_USER: ""
  script:
    - |
      # Get master IP from Terraform output
      cd ${TF_DIR}
      export AWS_ACCESS_KEY_ID=${OTC_ACCESS_KEY}
      export AWS_SECRET_ACCESS_KEY=${OTC_SECRET_KEY}
      terraform init -input=false
      export MASTER_IP=$(terraform output -raw master_ip)
      export VPC_ID=$(terraform output -raw vpc_id)
      export SUBNET_ID=$(terraform output -raw subnet_id)
      export SUBNET_NETWORK_ID=$(terraform output -raw subnet_network_id)
      cd ${CI_PROJECT_DIR}

      # Generate cloud.conf
      export CLOUD_CONFIG=$(cat <<CONFEOF
      auth:
        access_key: "${OTC_ACCESS_KEY}"
        secret_key: "${OTC_SECRET_KEY}"
        project_id: "${OTC_PROJECT_ID}"
        project_name: "${OTC_PROJECT_NAME}"
        user_domain_name: "${OTC_DOMAIN_NAME}"
      region: "eu-ch2"
      network:
        vpc_id: "${VPC_ID}"
        subnet_id: "${SUBNET_NETWORK_ID}"
        network_id: "${SUBNET_ID}"
      loadbalancer:
        availability_zones:
          - "eu-ch2a"
      CONFEOF
      )
      export CLOUD_CONFIG=$(echo "$CLOUD_CONFIG" | sed 's/^      //')

      # Run post-apply script
      chmod +x scripts/post-apply.sh
      scripts/post-apply.sh
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

# ─────────────────────────────────────────────
# CCM Build
# ─────────────────────────────────────────────

ccm:build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - docker build -t ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA} -t ${IMAGE_NAME}:latest .
    - docker push ${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}
    - docker push ${IMAGE_NAME}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "pkg/**/*"
        - "cmd/**/*"
        - "go.mod"
        - "go.sum"
        - "Dockerfile"

# ─────────────────────────────────────────────
# CCM Deploy (runs on self-hosted runner)
# ─────────────────────────────────────────────

ccm:deploy:
  stage: deploy
  tags:
    - otc          # Runs on self-hosted runner with cluster access
  image: alpine/helm:3.14.0
  variables:
    DRY_RUN: "true"
  before_script:
    - mkdir -p ~/.kube
    - echo "${KUBECONFIG_CONTENT}" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - |
      HELM_ARGS="--namespace kube-system \
        --set image.repository=${IMAGE_NAME} \
        --set image.tag=latest \
        --set existingSecret=swiss-otc-cloud-config \
        --set imagePullSecrets[0].name=registry-pull-secret"

      if [ "${DRY_RUN}" = "true" ]; then
        helm upgrade --install swiss-otc-ccm ${HELM_CHART} ${HELM_ARGS} --dry-run
      else
        helm upgrade --install swiss-otc-ccm ${HELM_CHART} ${HELM_ARGS} --wait --timeout 120s
      fi
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
