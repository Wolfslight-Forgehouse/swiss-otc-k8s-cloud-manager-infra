apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root-user
  annotations:
    policies.kyverno.io/title: Require Non-Root User
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Containers must not run as UID 0 (root). This policy validates that
      runAsUser is set to a non-zero value at either the pod or container
      level, providing defense-in-depth beyond runAsNonRoot.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: non-root-user
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - cattle-system
                - calico-system
      validate:
        message: >-
          Running as root (UID 0) is not allowed. Set
          securityContext.runAsUser to a non-zero value.
        anyPattern:
          - spec:
              securityContext:
                runAsUser: ">0"
              containers:
                - =(securityContext):
                    =(runAsUser): ">0"
              =(initContainers):
                - =(securityContext):
                    =(runAsUser): ">0"
              =(ephemeralContainers):
                - =(securityContext):
                    =(runAsUser): ">0"
          - spec:
              containers:
                - securityContext:
                    runAsUser: ">0"
              =(initContainers):
                - securityContext:
                    runAsUser: ">0"
              =(ephemeralContainers):
                - securityContext:
                    runAsUser: ">0"
