apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require Standard Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Standard Kubernetes labels improve observability and ownership tracking.
      This policy requires that all pods have the app.kubernetes.io/name and
      app.kubernetes.io/team labels set to non-empty values.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-labels
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - cattle-system
                - calico-system
      validate:
        message: >-
          The labels app.kubernetes.io/name and app.kubernetes.io/team are
          required. Add these labels to the pod metadata.
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
              app.kubernetes.io/team: "?*"
