apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-probes
  annotations:
    policies.kyverno.io/title: Require Liveness and Readiness Probes
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Liveness and readiness probes are essential for reliable service
      operation. Liveness probes detect deadlocks and restart containers,
      while readiness probes prevent traffic to unready pods. This policy
      requires both probes on all containers.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-probes
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - cattle-system
                - calico-system
      validate:
        message: >-
          Liveness and readiness probes are required for all containers.
          Set livenessProbe and readinessProbe on each container.
        pattern:
          spec:
            containers:
              - livenessProbe:
                  ?*: "?*"
                readinessProbe:
                  ?*: "?*"
