# Test LoadBalancer Service for Swiss OTC ELB v3
# This manifest will test our new cloud controller implementation

apiVersion: v1
kind: Namespace
metadata:
  name: test-swiss-otc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: test-swiss-otc
  labels:
    app: nginx-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-loadbalancer
  namespace: test-swiss-otc
  annotations:
    # Swiss OTC specific annotations
    otc.io/subnet-id: "subnet-12345678"  # Replace with your VPC subnet ID
    # Optional: ELB configuration
    otc.io/load-balancer-type: "External"
    otc.io/load-balancer-algorithm: "round_robin"
    otc.io/load-balancer-session-affinity: "false"
  labels:
    app: nginx-test
    test: swiss-otc-elb-v3
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: nginx-test
---
# Test Service without LoadBalancer for comparison
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: test-swiss-otc
  labels:
    app: nginx-test
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
  selector:
    app: nginx-test