# CIS 5.2.6 — Minimize allowPrivilegeEscalation
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
  annotations:
    policies.kyverno.io/title: Disallow Privilege Escalation
    policies.kyverno.io/category: CIS 5.2.6
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: no-privilege-escalation
      match:
        any:
        - resources:
            kinds: [Pod]
            namespaces: [default, monitoring, argocd, cnpg-system]
      validate:
        message: "allowPrivilegeEscalation=false erforderlich (CIS 5.2.6)"
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: "false"
---
# CIS 5.7.2 — seccomp profile
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-seccomp-profile
  annotations:
    policies.kyverno.io/title: Require seccomp Profile
    policies.kyverno.io/category: CIS 5.7.2
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-seccomp
      match:
        any:
        - resources:
            kinds: [Pod]
            namespaces: [default]
      validate:
        message: "seccomp profile erforderlich (CIS 5.7.2)"
        pattern:
          spec:
            securityContext:
              seccompProfile:
                type: "RuntimeDefault | Localhost"
