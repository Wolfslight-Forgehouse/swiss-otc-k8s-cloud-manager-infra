# CIS 5.2.2 — Minimize admission of privileged containers
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: CIS 5.2.2
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: no-privileged
      match:
        any:
        - resources:
            kinds: [Pod]
            namespaces:
              - default
              - monitoring
              - argocd
              - cnpg-system
      validate:
        message: "Privileged containers sind nicht erlaubt (CIS 5.2.2)"
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): "false"
---
