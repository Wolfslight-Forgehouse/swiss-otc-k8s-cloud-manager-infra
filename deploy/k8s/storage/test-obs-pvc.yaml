---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-obs-10g
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: csi-obs
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: test-obs-pod
  namespace: default
spec:
  containers:
  - name: test
    image: nginx:alpine
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "OBS CSI Test - $(date)" > /data/test.txt
        cat /data/test.txt
        sleep 3600
    volumeMounts:
    - name: obs-data
      mountPath: /data
  volumes:
  - name: obs-data
    persistentVolumeClaim:
      claimName: test-obs-10g
