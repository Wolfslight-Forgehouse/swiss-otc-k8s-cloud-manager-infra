# ingress-nginx: INTERNAL
# IngressClass: nginx-internal
# CCM erstellt ELB ohne EIP → nur VPC-intern erreichbar
#
# Annotation auf Ingress: kubernetes.io/ingress.class: nginx-internal

controller:
  ingressClassResource:
    name: nginx-internal
    enabled: true
    default: false
    controllerValue: "k8s.io/ingress-nginx-internal"

  ingressClass: nginx-internal

  service:
    type: LoadBalancer
    annotations:
      # CCM: interner ELB ohne EIP
      otc.io/elb-virsubnet-id: "${SUBNET_ID}"
      # Kein EIP — VPC-intern
      otc.io/elb-eip-bandwidth-size: "0"

  admissionWebhooks:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
