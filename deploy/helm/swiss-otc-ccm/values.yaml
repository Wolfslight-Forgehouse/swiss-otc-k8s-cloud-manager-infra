image:
  # Option 1: Container image (for production/CI)
  repository: ghcr.io/wolfslight-forgehouse/swiss-otc-cloud-controller-manager
  tag: latest
  pullPolicy: Always

  # Option 2: Host binary (for dev/edge — no image registry needed)
  useHostBinary: false
  hostBinaryDir: /usr/local/bin

replicas: 1
logLevel: 2
leaderElect: true
extraArgs:
  - --allow-untagged-cloud

imagePullSecrets: []

cloudConfig:
  auth:
    authUrl: https://iam-pub.eu-ch2.sc.otc.t-systems.com/v3
    username: ""
    password: ""
    accessKey: ""
    secretKey: ""
    projectName: ""
    projectId: ""
    userDomainName: ""
  region: eu-ch2
  network:
    vpcId: ""
    subnetId: ""
    networkId: ""
  loadbalancer:
    availabilityZones:
      - eu-ch2a
      - eu-ch2b
  metadata:
    clusterId: ""

# Use existing secret for cloud config instead of values
existingSecret: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector:
  node-role.kubernetes.io/control-plane: "true"

tolerations:
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule
  - key: node.cloudprovider.kubernetes.io/uninitialized
    value: "true"
    effect: NoSchedule

serviceAccount:
  create: true
  name: swiss-otc-ccm
