# Cinder CSI Plugin — Swiss OTC eu-ch2
# cloud.conf wird als Secret via Pipeline injiziert

secret:
  enabled: true
  create: true
  name: cinder-csi-cloud-config
  # Data wird via pipeline --set-string überschrieben
  data:
    cloud.conf: |
      [Global]
      auth-url=PLACEHOLDER
      region=eu-ch2
      access-key=PLACEHOLDER
      secret-key=PLACEHOLDER
      project-id=PLACEHOLDER

storageClass:
  enabled: true
  delete:
    isDefault: true
    allowVolumeExpansion: true
  retain:
    isDefault: false
    allowVolumeExpansion: true
  custom: |-
    ---
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: csi-evs-ssd
      annotations:
        storageclass.kubernetes.io/is-default-class: "false"
    provisioner: cinder.csi.openstack.org
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    parameters:
      type: SSD
      availability: eu-ch2a
    ---
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: csi-evs-sas
    provisioner: cinder.csi.openstack.org
    volumeBindingMode: WaitForFirstConsumer
    allowVolumeExpansion: true
    parameters:
      type: SAS
      availability: eu-ch2a

clusterID: rke2-dev

logVerbosityLevel: 2
