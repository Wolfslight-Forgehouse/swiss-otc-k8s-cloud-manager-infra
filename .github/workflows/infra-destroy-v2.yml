name: "Terraform Destroy"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true

permissions:
  contents: read

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OTC_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_access_key: ${{ secrets.OTC_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_project_id: ${{ secrets.OTC_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_rke2_token: ${{ secrets.RKE2_TOKEN }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
      TF_VAR_ghcr_pull_token: ${{ secrets.GHCR_PULL_TOKEN }}
      TF_VAR_github_runner_token: ""
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Pre-Destroy - Delete LB Services and wait for CCM ELB cleanup
        if: github.event.inputs.confirm == 'DESTROY'
        continue-on-error: true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          BASTION_IP=$(terraform output -raw bastion_public_ip 2>/dev/null || echo "")
          MASTER_IP=$(terraform output -raw master_private_ip 2>/dev/null || echo "")
          if [ -z "$BASTION_IP" ]; then
            echo "No bastion IP in TF state — skipping ELB cleanup"
            exit 0
          fi
          echo "Bastion: $BASTION_IP | Master: $MASTER_IP"

          echo "$SSH_PRIVATE_KEY" > /tmp/master-key && chmod 600 /tmp/master-key
          ssh-keyscan -H "$BASTION_IP" >> ~/.ssh/known_hosts 2>/dev/null
          scp -o StrictHostKeyChecking=no -i /tmp/master-key \
            /tmp/master-key ubuntu@"$BASTION_IP":/tmp/master-key
          ssh -o StrictHostKeyChecking=no ubuntu@"$BASTION_IP" "chmod 600 /tmp/master-key"

          ssh -o StrictHostKeyChecking=no ubuntu@"$BASTION_IP" \
            ssh -o StrictHostKeyChecking=no -i /tmp/master-key ubuntu@"$MASTER_IP" << 'REMOTESCRIPT'
          K="sudo /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml"

          # Delete all LoadBalancer type services (CCM will delete the ELBs on OTC)
          echo "=== Deleting all LoadBalancer services ==="
          $K get svc --all-namespaces --no-headers 2>/dev/null | \
            awk '$4=="LoadBalancer" {print $1"/"$2}' | \
            while IFS=/ read NS NAME; do
              echo "  Deleting $NS/$NAME"
              $K delete svc "$NAME" -n "$NS" --timeout=30s 2>/dev/null || true
            done

          # Wait up to 3 minutes for CCM to clean up ELBs on OTC
          echo "=== Waiting for CCM to remove ELBs (max 3min) ==="
          for i in $(seq 1 18); do
            COUNT=$($K get svc --all-namespaces --no-headers 2>/dev/null | \
              awk '$4=="LoadBalancer"' | wc -l)
            echo "  [$i/18] Remaining LB services: $COUNT"
            [ "$COUNT" -eq 0 ] && { echo "All ELBs cleaned up"; break; }
            sleep 10
          done
          REMOTESCRIPT

      - name: Terraform Destroy
        if: github.event.inputs.confirm == 'DESTROY'
        run: terraform destroy -auto-approve
