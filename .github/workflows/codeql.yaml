name: Security Scan

on:
  push:
    branches: [main]
    paths: ['pkg/**', 'cmd/**', 'go.*']
  pull_request:
    branches: [main]
    paths: ['pkg/**', 'cmd/**', 'go.*']
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  GO_VERSION: '1.25'

jobs:
  # govulncheck: prüft Go-Dependencies auf bekannte CVEs (kostenlos, kein Advanced Security nötig)
  govulncheck:
    name: govulncheck (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # staticcheck: erweiterte statische Analyse (Bugs, Ineffizienzen)
  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Run staticcheck
        run: staticcheck ./...

  # CodeQL nur für public repos (Advanced Security nötig für private)
  codeql:
    name: CodeQL (public repo only)
    runs-on: ubuntu-latest
    # Nur auf public Repos — bei private überspringen
    if: github.event.repository.private == false
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
