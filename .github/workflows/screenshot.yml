name: Demo App Screenshot
on:
  workflow_dispatch:
    inputs:
      elb_ip:
        description: "ELB External IP der Demo App"
        required: true
        default: "138.124.232.72"

jobs:
  screenshot:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright + Screenshot
        run: |
          cd /tmp
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1
          cp $GITHUB_WORKSPACE/scripts/screenshot.mjs .
          ELB_IP="${{ inputs.elb_ip }}" node --input-type=module < screenshot.mjs

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: demo-app-screenshot
          path: /tmp/demo-app.png
          retention-days: 14
