name: Validate CNI (Kube-OVN)
on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          BASTION_IP:      ${{ secrets.BASTION_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/rke2-key
          chmod 600 ~/.ssh/rke2-key
          ssh-keyscan -H "$BASTION_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH key fingerprint: $(ssh-keygen -l -f ~/.ssh/rke2-key 2>/dev/null || echo INVALID)"
          echo "✅ SSH bereit"

      - name: Validate Kube-OVN on Master
        env:
          BASTION_IP: ${{ secrets.BASTION_IP }}
          MASTER_IP:  ${{ secrets.MASTER_IP }}
        run: |
          ssh -i ~/.ssh/rke2-key -o StrictHostKeyChecking=no \
            -J ubuntu@${BASTION_IP} ubuntu@${MASTER_IP} << 'REMOTE'
          K="sudo kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml --insecure-skip-tls-verify"

          echo "=============================================="
          echo "  Kube-OVN CNI Validation Report"
          echo "  $(date)"
          echo "=============================================="

          echo ""
          echo "=== Nodes ==="
          $K get nodes -o wide

          echo ""
          echo "=== Kube-OVN Pods ==="
          $K get pods -n kube-system | grep -E "kube-ovn|ovn"

          echo ""
          echo "=== Kube-OVN Subnets ==="
          $K get subnet 2>/dev/null || echo "(keine Subnet CRD)"

          echo ""
          echo "=== Pod-to-Pod Connectivity Test ==="
          $K run test-a --image=busybox:latest --restart=Never \
            --command -- sleep 60 2>/dev/null || true
          $K run test-b --image=busybox:latest --restart=Never \
            --command -- sleep 60 2>/dev/null || true
          sleep 12

          IP_B=$($K get pod test-b -o jsonpath='{.status.podIP}' 2>/dev/null || echo "")
          echo "test-b IP: $IP_B"

          if [ -n "$IP_B" ]; then
            $K exec test-a -- ping -c3 -W2 "$IP_B" 2>/dev/null && \
              echo "✅ Pod-to-Pod: OK" || echo "❌ Pod-to-Pod: FAIL"
          fi

          echo ""
          echo "=== DNS Test ==="
          $K exec test-a -- nslookup kubernetes.default 2>/dev/null && \
            echo "✅ DNS: OK" || echo "❌ DNS: FAIL"

          echo ""
          echo "=== Services ==="
          $K get svc -n default

          echo ""
          echo "=== PVCs ==="
          $K get pvc -n default

          echo ""
          echo "=== Cleanup ==="
          $K delete pod test-a test-b --ignore-not-found 2>/dev/null
          echo "✅ Done"
          REMOTE

      - name: Kube-OVN Overlay vs Underlay Summary
        run: |
          echo "=============================================="
          echo "  Overlay (Geneve) vs Underlay — Bewertung"
          echo "=============================================="
          echo ""
          echo "Overlay (aktuell, Geneve):"
          echo "  ✅ Kein OTC VPC Routing nötig"
          echo "  ✅ Vollständige Network Policies"
          echo "  ✅ Einfache Installation"
          echo "  ⚠️  Leichter MTU-Overhead (~50 bytes)"
          echo ""
          echo "Underlay (OTC VPC native):"
          echo "  ✅ Pods bekommen direkte VPC IPs"
          echo "  ✅ Kein Overlay-Overhead"
          echo "  ❌ Braucht OTC Neutron Port-Security Anpassung"
          echo "  ❌ Aufwändig: Custom Routes pro Node in Terraform"
          echo ""
          echo "Empfehlung: Overlay reicht für Production."
          echo "Underlay nur wenn: direkte VPC-IP für Pods oder max. Performance nötig."
