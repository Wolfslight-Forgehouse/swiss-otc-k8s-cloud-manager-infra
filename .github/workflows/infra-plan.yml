name: "Terraform Plan"
on:
  pull_request:
    paths: ["terraform/**"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    env:
      # OBS Backend (S3-compatible)
      AWS_ACCESS_KEY_ID: ${{ secrets.OTC_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OTC_SECRET_KEY }}
      # Terraform Provider
      TF_VAR_access_key: ${{ secrets.OTC_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_project_id: ${{ secrets.OTC_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_rke2_token: ${{ secrets.RKE2_TOKEN }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
      TF_VAR_github_runner_token: ${{ secrets.GITHUB_RUNNER_TOKEN }}
      TF_VAR_ghcr_pull_token: ${{ secrets.GHCR_PULL_TOKEN }}
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fmt = '${{ steps.fmt.outcome }}' === 'success' ? '✅' : '⚠️ needs `terraform fmt`';
            const output = `#### Terraform Plan 📋
            
            | Check | Status |
            |-------|--------|
            | Format | ${fmt} |
            | Init | ✅ |
            | Validate | ✅ |
            
            <details><summary>Plan Output</summary>
            
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Pushed by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
