name: "Terraform Apply"
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type APPLY to confirm"
        required: true

permissions:
  contents: read

jobs:
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'APPLY'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OTC_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_access_key: ${{ secrets.OTC_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_project_id: ${{ secrets.OTC_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
      TF_VAR_rke2_token: ${{ secrets.RKE2_TOKEN }}
      TF_VAR_ghcr_pull_token: ${{ secrets.GHCR_PULL_TOKEN }}
      TF_VAR_domain_name: ""
      TF_VAR_project_name: ""
      TF_VAR_github_runner_token: ""
      TF_VAR_gitlab_url: ""
      TF_VAR_gitlab_runner_token: ""
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.OTC_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.OTC_SECRET_KEY }}"

      - name: Terraform Plan
        run: terraform plan -no-color

      - name: Terraform Apply
        id: tf-apply
        run: |
          terraform apply -auto-approve -no-color
          echo "master_ip=$(terraform output -raw master_ip)"               >> $GITHUB_OUTPUT
          echo "bastion_ip=$(terraform output -raw bastion_ip)"             >> $GITHUB_OUTPUT
          echo "bastion_private_ip=$(terraform output -raw bastion_private_ip)" >> $GITHUB_OUTPUT
          echo "vpc_id=$(terraform output -raw vpc_id)"                     >> $GITHUB_OUTPUT
          echo "subnet_id=$(terraform output -raw subnet_id)"               >> $GITHUB_OUTPUT
          echo "subnet_network_id=$(terraform output -raw subnet_network_id)"   >> $GITHUB_OUTPUT
          echo "security_group_id=$(terraform output -raw security_group_id)"   >> $GITHUB_OUTPUT

    outputs:
      master_ip:          ${{ steps.tf-apply.outputs.master_ip }}
      bastion_ip:         ${{ steps.tf-apply.outputs.bastion_ip }}
      bastion_private_ip: ${{ steps.tf-apply.outputs.bastion_private_ip }}
      vpc_id:             ${{ steps.tf-apply.outputs.vpc_id }}
      subnet_id:          ${{ steps.tf-apply.outputs.subnet_id }}
      subnet_network_id:  ${{ steps.tf-apply.outputs.subnet_network_id }}
      security_group_id:  ${{ steps.tf-apply.outputs.security_group_id }}

  post-apply:
    name: "Post-Apply: kubeconfig + CCM + Demo App"
    needs: apply
    runs-on: ubuntu-latest
    if: success()
    env:
      BASTION_IP:  ${{ needs.apply.outputs.bastion_ip }}
      MASTER_IP:   ${{ needs.apply.outputs.master_ip }}
      VPC_ID:      ${{ needs.apply.outputs.vpc_id }}
      SUBNET_ID:   ${{ needs.apply.outputs.subnet_network_id }}
      NETWORK_ID:  ${{ needs.apply.outputs.subnet_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/rke2-key
          chmod 600 ~/.ssh/rke2-key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Wait for RKE2 master
        run: |
          echo "⏳ Warte auf RKE2 master ($MASTER_IP via $BASTION_IP)..."
          for i in $(seq 1 40); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                -i ~/.ssh/rke2-key -J ubuntu@$BASTION_IP ubuntu@$MASTER_IP \
                'sudo systemctl is-active rke2-server' 2>/dev/null | grep -q "^active$"; then
              echo "✅ RKE2 aktiv"
              break
            fi
            echo "  Attempt $i/40 — 15s..."
            sleep 15
          done

      - name: Fetch kubeconfig
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/rke2-key \
            -J ubuntu@$BASTION_IP ubuntu@$MASTER_IP \
            'sudo cat /etc/rancher/rke2/rke2.yaml' | \
            sed "s/127.0.0.1/$MASTER_IP/g" > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
          kubectl --insecure-skip-tls-verify get nodes -o wide

      - uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Deploy OTC Cloud Manager
        env:
          OTC_AK: ${{ secrets.OTC_ACCESS_KEY }}
          OTC_SK: ${{ secrets.OTC_SECRET_KEY }}
          OTC_PROJECT_ID: ${{ secrets.OTC_PROJECT_ID }}
        run: |
          helm upgrade --install swiss-otc-ccm deploy/helm/swiss-otc-ccm/ \
            --namespace kube-system \
            --set config.auth.access_key="$OTC_AK" \
            --set config.auth.secret_key="$OTC_SK" \
            --set config.auth.project_id="$OTC_PROJECT_ID" \
            --set config.network.vpc_id="$VPC_ID" \
            --set config.network.subnet_id="$SUBNET_ID" \
            --set config.network.network_id="$NETWORK_ID" \
            --set config.loadbalancer.availability_zones[0]="eu-ch2a" \
            --insecure-skip-tls-verify \
            --wait --timeout=5m
          kubectl --insecure-skip-tls-verify get pods -n kube-system -l app.kubernetes.io/name=swiss-otc-ccm

      - name: Deploy + Screenshot Demo App
        run: |
          kubectl --insecure-skip-tls-verify apply -f examples/kubernetes/test-loadbalancer-service.yaml
          echo "⏳ Warte auf ELB External-IP..."
          for i in $(seq 1 36); do
            EXT_IP=$(kubectl --insecure-skip-tls-verify get svc -A \
              -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$EXT_IP" ]; then
              echo "✅ ELB IP: $EXT_IP"
              echo "ELB_IP=$EXT_IP" >> $GITHUB_ENV
              break
            fi
            echo "  Attempt $i/36 — 10s..."
            sleep 10
          done

      - name: Smoke Test
        if: env.ELB_IP != ''
        run: |
          for i in $(seq 1 12); do
            HTTP=$(curl -s -o /tmp/response.html -w "%{http_code}" --max-time 5 "http://$ELB_IP" || echo "000")
            echo "HTTP $HTTP"
            [ "$HTTP" = "200" ] && break
            sleep 10
          done
          cat /tmp/response.html | head -5

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🚀 E2E Deployment"
            echo "| Resource | Value |"
            echo "|---|---|"
            echo "| Bastion IP | \`$BASTION_IP\` |"
            echo "| Master IP | \`$MASTER_IP\` |"
            echo "| Demo App ELB | \`${ELB_IP:-pending}\` |"
          } >> $GITHUB_STEP_SUMMARY
