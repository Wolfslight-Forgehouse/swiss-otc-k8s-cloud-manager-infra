name: "Terraform Destroy"
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true

permissions:
  contents: read

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OTC_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_access_key: ${{ secrets.OTC_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_project_id: ${{ secrets.OTC_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_rke2_token: ${{ secrets.RKE2_TOKEN }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
      TF_VAR_ghcr_pull_token: ${{ secrets.GHCR_PULL_TOKEN }}
      TF_VAR_github_runner_token: ""
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Get Bastion IP from TF State
        id: bastion
        run: |
          pip install awscli --quiet 2>/dev/null || true
          terraform init -input=false
          BASTION_IP=$(terraform output -raw bastion_public_ip 2>/dev/null || echo "")
          MASTER_IP=$(terraform output -raw master_private_ip 2>/dev/null || echo "")
          echo "bastion_ip=$BASTION_IP" >> $GITHUB_OUTPUT
          echo "master_ip=$MASTER_IP" >> $GITHUB_OUTPUT
          echo "Bastion: $BASTION_IP | Master: $MASTER_IP"

      - name: Pre-Destroy: Clean ELBs via kubectl
        if: steps.bastion.outputs.bastion_ip != ''
        continue-on-error: true
        env:
          BASTION_IP: ${{ steps.bastion.outputs.bastion_ip }}
          MASTER_IP: ${{ steps.bastion.outputs.master_ip }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/master-key && chmod 600 /tmp/master-key
          ssh-keyscan -H $BASTION_IP >> ~/.ssh/known_hosts 2>/dev/null

          # Copy key to bastion
          scp -o StrictHostKeyChecking=no -i /tmp/master-key /tmp/master-key ubuntu@$BASTION_IP:/tmp/master-key
          ssh ubuntu@$BASTION_IP "chmod 600 /tmp/master-key"

          # Delete all LoadBalancer services
          ssh -o StrictHostKeyChecking=no ubuntu@$BASTION_IP \
            "ssh -o StrictHostKeyChecking=no -i /tmp/master-key ubuntu@$MASTER_IP \
            'K=\"sudo /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml\"
             \$K get svc --all-namespaces | grep LoadBalancer || true
             \$K delete svc --all-namespaces -l \"\" --field-selector spec.type=LoadBalancer 2>/dev/null || true
             # Direct delete demo-lb
             \$K delete svc demo-lb -n default 2>/dev/null || true
             echo Waiting 30s for CCM to delete ELBs...
             sleep 30'" || true
          echo "Pre-destroy ELB cleanup done"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
