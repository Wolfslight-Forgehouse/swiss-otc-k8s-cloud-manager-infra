name: "Terraform Destroy"
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm"
        required: true

permissions:
  contents: read

jobs:
  # Step 1: Clean up K8s LoadBalancer services so CCM deletes ELBs
  pre-destroy:
    name: "Pre-Destroy: Clean ELBs"
    runs-on: [self-hosted, otc]
    if: github.event.inputs.confirm == 'DESTROY'
    steps:
      - name: Delete LoadBalancer services
        run: |
          echo "=== Cleaning up LoadBalancer services ==="
          # Get all LoadBalancer services across all namespaces
          LB_SVCS=$(kubectl get svc --all-namespaces -o json | \
            jq -r '.items[] | select(.spec.type=="LoadBalancer") | "\(.metadata.namespace)/\(.metadata.name)"')
          
          if [ -z "$LB_SVCS" ]; then
            echo "No LoadBalancer services found — nothing to clean up"
            exit 0
          fi
          
          echo "Found LoadBalancer services:"
          echo "$LB_SVCS"
          
          # Delete each service
          echo "$LB_SVCS" | while read svc; do
            NS=$(echo $svc | cut -d/ -f1)
            NAME=$(echo $svc | cut -d/ -f2)
            echo "Deleting $NS/$NAME..."
            kubectl delete svc "$NAME" -n "$NS" --timeout=60s || true
          done
          
          # Wait for CCM to clean up ELBs on OTC
          echo "Waiting 30s for CCM to delete ELBs on OTC..."
          sleep 30
          
          # Verify no more pending LBs
          REMAINING=$(kubectl get svc --all-namespaces -o json | \
            jq -r '.items[] | select(.spec.type=="LoadBalancer") | .metadata.name' | wc -l)
          echo "Remaining LoadBalancer services: $REMAINING"
    continue-on-error: true  # Don't block destroy if runner is offline

  # Step 2: Terraform Destroy
  destroy:
    name: "Terraform Destroy"
    needs: pre-destroy
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'DESTROY' && always()
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.OTC_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_access_key: ${{ secrets.OTC_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.OTC_SECRET_KEY }}
      TF_VAR_project_id: ${{ secrets.OTC_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_rke2_token: ${{ secrets.RKE2_TOKEN }}
      TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
      TF_VAR_ghcr_pull_token: ${{ secrets.GHCR_PULL_TOKEN }}
      TF_VAR_github_runner_token: ""
    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan Destroy
        run: terraform plan -destroy -no-color

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
