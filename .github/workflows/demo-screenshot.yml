name: Demo App Screenshot
on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          BASTION_IP:      ${{ secrets.BASTION_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/rke2-key
          chmod 600 ~/.ssh/rke2-key
          ssh-keyscan -H "$BASTION_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "✅ SSH bereit"

      - name: Fetch Demo App HTML via Bastion
        env:
          BASTION_IP: ${{ secrets.BASTION_IP }}
          MASTER_IP:  ${{ secrets.MASTER_IP }}
        run: |
          ELB_IP=$(ssh -i ~/.ssh/rke2-key -o StrictHostKeyChecking=no \
            -J ubuntu@${BASTION_IP} ubuntu@${MASTER_IP} \
            "sudo kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml get svc demo-lb -n default \
             -o jsonpath='{.status.loadBalancer.ingress[0].ip}'" 2>/dev/null || echo "")
          echo "ELB IP: $ELB_IP"
          [ -z "$ELB_IP" ] && echo "❌ Kein ELB IP" && exit 1

          ssh -i ~/.ssh/rke2-key -o StrictHostKeyChecking=no \
            ubuntu@${BASTION_IP} \
            "curl -sf --max-time 15 http://${ELB_IP}" > /tmp/demo-app.html
          echo "✅ HTML: $(wc -c < /tmp/demo-app.html) bytes"
          echo "ELB_IP=$ELB_IP" >> $GITHUB_ENV

      - name: Install Playwright
        run: |
          cd /tmp && npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1
          echo "✅ Playwright ready"

      - name: Screenshot
        run: |
          HTML_FILE=/tmp/demo-app.html \
          SCREENSHOT_OUT=/tmp/demo-app.png \
          node $GITHUB_WORKSPACE/scripts/screenshot.cjs

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: demo-app-screenshot
          path: /tmp/demo-app.png
          retention-days: 14
