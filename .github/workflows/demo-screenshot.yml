name: Demo App Screenshot
on:
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Tunnel (kubectl API)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          BASTION_IP:      ${{ secrets.BASTION_IP }}
          MASTER_IP:       ${{ secrets.MASTER_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/rke2-key
          chmod 600 ~/.ssh/rke2-key
          ssh-keyscan -H "$BASTION_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/rke2-key -o StrictHostKeyChecking=no \
            -o ExitOnForwardFailure=yes \
            -fNL 6443:${MASTER_IP}:6443 \
            ubuntu@${BASTION_IP}
          echo "✅ Tunnel offen"

          ssh -i ~/.ssh/rke2-key -o StrictHostKeyChecking=no \
            -J ubuntu@${BASTION_IP} ubuntu@${MASTER_IP} \
            "sudo cat /etc/rancher/rke2/rke2.yaml" 2>/dev/null \
            | sed 's|https://.*:6443|https://127.0.0.1:6443|g' \
            > /tmp/kubeconfig.yaml
          echo "✅ kubeconfig geholt"

      - name: kubectl port-forward Demo App
        run: |
          KUBECONFIG=/tmp/kubeconfig.yaml kubectl --insecure-skip-tls-verify \
            port-forward svc/demo-lb 8080:80 -n default &
          sleep 5
          for i in $(seq 1 15); do
            curl -sf --max-time 3 http://localhost:8080 > /dev/null 2>&1 \
              && echo "✅ Demo App erreichbar" && break
            echo "  [$i/15] warte..."
            sleep 3
          done

      - name: Install Playwright
        run: |
          cd /tmp
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1
          echo "✅ Playwright ready"

      - name: Screenshot
        run: |
          SCREENSHOT_URL=http://localhost:8080 node $GITHUB_WORKSPACE/scripts/screenshot.cjs

      - name: Upload Screenshot
        uses: actions/upload-artifact@v4
        with:
          name: demo-app-screenshot
          path: /tmp/demo-app.png
          retention-days: 14
